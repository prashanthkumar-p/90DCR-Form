<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DCR Reflection v2.0</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f3f7fb, #e7f0ec);
    margin: 0;
    padding: 16px;
    color: #222;
  }

  .app {
    max-width: 680px;
    margin: auto;
  }

  .hero {
    background: white;
    border-radius: 18px;
    padding: 22px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    margin-bottom: 18px;
  }

  .brand {
    font-size: 13px;
    letter-spacing: 3px;
    font-weight: bold;
    color: #2f7d4f;
  }

  h1 {
    margin: 8px 0 4px;
    font-size: 28px;
  }

  .tagline {
    font-size: 14px;
    color: #666;
  }

  .card {
    background: white;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
  }

  .card h3 {
    margin-top: 0;
    margin-bottom: 12px;
  }

  label {
    display: block;
    font-weight: bold;
    margin-top: 14px;
    font-size: 14px;
  }

  input, textarea, select {
    width: 100%;
    padding: 11px;
    margin-top: 6px;
    border-radius: 10px;
    border: 1px solid #ccc;
    box-sizing: border-box;
    font-size: 15px;
  }

  textarea {
    min-height: 80px;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .pa-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 10px;
  }

  .check-item {
    border: 1px solid #ccc;
    border-radius: 10px;
    padding: 10px;
    background: #fafafa;
    font-weight: bold;
  }

  .check-item input {
    width: auto;
    margin-right: 8px;
  }

  button {
    width: 100%;
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-size: 17px;
    font-weight: bold;
    color: white;
    background: #2f7d4f;
    margin-top: 12px;
    cursor: pointer;
  }

  button:disabled {
    background: #999;
  }

  .output {
    background: #111;
    color: white;
    border-radius: 18px;
    padding: 22px;
    white-space: pre-wrap;
    text-align: center;
    line-height: 1.5;
    margin-top: 18px;
  }

  .hidden {
    display: none;
  }

  @media (max-width: 520px) {
    .row, .pa-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<body>
<div class="app">

  <div class="hero">
    <div class="brand">ALTAGRID</div>
    <h1>DCR Reflection v2.0</h1>
    <div class="tagline">One Day. One Decision. One Win.</div>
  </div>

  <form id="reflectionForm">

    <div class="card">
      <h3>🏃 DCR</h3>

      <label>Name</label>
      <input type="text" id="name" required />

      <label>Date</label>
      <input type="date" id="date" required />

      <div class="row">
        <div>
          <label>DCR Type</label>
          <select id="dcr" required>
            <option value="">Select</option>
            <option value="30DCR">30DCR</option>
            <option value="90DCR">90DCR</option>
          </select>
        </div>

        <div>
          <label>Day of Core Run</label>
          <select id="dcrDay" required>
            <option value="">Select DCR first</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>✅ U — Products</h3>
      <label>Used all products you can?</label>
      <select id="used" required>
        <option value="Yes - All I could use today">Yes - All I could use today</option>
        <option value="No">No</option>
      </select>
    </div>

    <div class="card">
      <h3>🎧 L — Listen</h3>

      <label>Audio Track</label>
      <input type="text" id="audioTrack" />

      <label>Speaker</label>
      <input type="text" id="speaker" />

      <label>Key Takeaways</label>
      <textarea id="listenTakeaway"></textarea>
    </div>

    <div class="card">
      <h3>📖 R — Reading</h3>

      <label>Book Title</label>
      <input type="text" id="book" />

      <div class="row">
        <div>
          <label>Chapter Number</label>
          <input type="text" id="chapterNumber" />
        </div>

        <div>
          <label>Chapter Name</label>
          <input type="text" id="chapterName" />
        </div>
      </div>

      <label>Reading Takeaways</label>
      <textarea id="readingTakeaway"></textarea>
    </div>

    <div class="card">
      <h3>🤝 A — Associate</h3>

      <label>Associate VES</label>
      <select id="associate">
        <option value="NA VES">NA VES</option>
        <option value="UK VES">UK VES</option>
        <option value="IND VES">IND VES</option>
        <option value="AUS VES">AUS VES</option>
      </select>

      <label>What’s one step you’re not willing to delay?</label>
      <input type="text" id="aFollow" />

      <label>Accountability Message</label>
      <select id="accountability">
        <option value="This message">This message</option>
      </select>
    </div>

    <div class="card">
      <h3>🗣 Conversations</h3>

      <label>Conversations Initiated?</label>
      <select id="conversation">
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>

      <label>Mode</label>
      <select id="mode">
        <option value="Online">Online</option>
        <option value="Offline">Offline</option>
        <option value="Both">Both</option>
      </select>

      <label>Process Appointments PA's Today?</label>
      <select id="paCount">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
      </select>

      <div id="paTypesBox" class="hidden">
        <label>Type of PA</label>
        <div class="pa-grid">
          <label class="check-item"><input type="checkbox" value="MG1" class="paType"> MG1</label>
          <label class="check-item"><input type="checkbox" value="BP1" class="paType"> BP1</label>
          <label class="check-item"><input type="checkbox" value="FP1" class="paType"> FP1</label>
          <label class="check-item"><input type="checkbox" value="BP2" class="paType"> BP2</label>
          <label class="check-item"><input type="checkbox" value="FP2" class="paType"> FP2</label>
          <label class="check-item"><input type="checkbox" value="Pre-Launch" class="paType"> Pre-Launch</label>
          <label class="check-item"><input type="checkbox" value="Launch" class="paType"> Launch</label>
          <label class="check-item"><input type="checkbox" value="Post Launch" class="paType"> Post Launch</label>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>🏃 Physical + 🧘 Meditation</h3>

      <label>Physical Exercise</label>
      <select id="exercise">
        <option value="">Blank</option>
        <option value="Run">Run</option>
        <option value="Walk">Walk</option>
        <option value="Swim">Swim</option>
        <option value="Gym">Gym</option>
        <option value="Yoga">Yoga</option>
        <option value="Other">Other</option>
      </select>

      <div id="otherExerciseBox" class="hidden">
        <label>Specify Exercise</label>
        <input type="text" id="otherExercise" />
      </div>

      <label>Meditation</label>
      <select id="meditation">
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
    </div>

    <div class="card">
      <h3>💭 Reflection</h3>

      <label>When you look back on today, who did you intentionally connect with?</label>
      <textarea id="journal"></textarea>
    </div>

    <button type="submit" id="submitBtn">Submit Reflection</button>
  </form>

  <div class="output hidden" id="output"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxI7YYgib0Ttox7DiIsju6KHJ7pcsstYml_mCM4MpwvDpxCpGfT5Q4lZCHceeE49GE0/exec";

const form = document.getElementById("reflectionForm");
const dcr = document.getElementById("dcr");
const dcrDay = document.getElementById("dcrDay");
const dateInput = document.getElementById("date");
const paCount = document.getElementById("paCount");
const paTypesBox = document.getElementById("paTypesBox");
const exercise = document.getElementById("exercise");
const otherExerciseBox = document.getElementById("otherExerciseBox");
const output = document.getElementById("output");
const submitBtn = document.getElementById("submitBtn");

dateInput.valueAsDate = new Date();

dcr.addEventListener("change", () => {
  const maxDay = dcr.value === "30DCR" ? 30 : dcr.value === "90DCR" ? 90 : 0;
  dcrDay.innerHTML = "";

  if (!maxDay) {
    dcrDay.innerHTML = '<option value="">Select DCR first</option>';
    return;
  }

  for (let i = 1; i <= maxDay; i++) {
    const option = document.createElement("option");
    option.value = `${i}/${maxDay}`;
    option.textContent = `${i}/${maxDay}`;
    dcrDay.appendChild(option);
  }
});

paCount.addEventListener("change", () => {
  paTypesBox.classList.toggle("hidden", paCount.value === "0");

  if (paCount.value === "0") {
    document.querySelectorAll(".paType").forEach(cb => cb.checked = false);
  }
});

exercise.addEventListener("change", () => {
  otherExerciseBox.classList.toggle("hidden", exercise.value !== "Other");
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  submitBtn.disabled = true;
  submitBtn.textContent = "Submitting...";

  const modeRaw = document.getElementById("mode").value;
  const mode = modeRaw === "Both" ? "Online and Offline" : modeRaw;

  const paTypes = [...document.querySelectorAll(".paType:checked")]
    .map(cb => cb.value);

  const exerciseValue = exercise.value === "Other"
    ? document.getElementById("otherExercise").value
    : exercise.value;

  const data = {
    date: dateInput.value,
    name: document.getElementById("name").value,
    dcr: dcr.value,
    dcrDay: dcrDay.value,
    used: document.getElementById("used").value,
    audioTrack: document.getElementById("audioTrack").value,
    speaker: document.getElementById("speaker").value,
    listenTakeaway: document.getElementById("listenTakeaway").value,
    book: document.getElementById("book").value,
    chapterNumber: document.getElementById("chapterNumber").value,
    chapterName: document.getElementById("chapterName").value,
    readingTakeaway: document.getElementById("readingTakeaway").value,
    associate: document.getElementById("associate").value,
    aFollow: document.getElementById("aFollow").value,
    accountability: document.getElementById("accountability").value,
    conversation: document.getElementById("conversation").value,
    mode,
    paCount: paCount.value,
    paTypes: paTypes.join(", ") || "N/A",
    exercise: exerciseValue || "None",
    meditation: document.getElementById("meditation").value,
    journal: document.getElementById("journal").value
  };

const result =
`━━━━━━━━━━━━━━━━━━

🏃 ${data.name.toUpperCase()}- ${data.dcr} • Day ${data.dcrDay}
📅 ${data.date}

━━━━━━━━━━━━━━━━━━

✅ Used Products: ${data.used}
🎧 Listen: ${data.audioTrack || "N/A"}${data.speaker ? " -" + data.speaker : ""}
📝 Key Takeaways: ${data.listenTakeaway || "N/A"}
📖 Reading: ${data.book || "N/A"}
Chapter ${data.chapterNumber || "N/A"} - ${data.chapterName || "N/A"}
📝 Reading Takeaways: ${data.readingTakeaway || "N/A"}
🤝 Associate: ${data.associate}
🎯 One Step: ${data.aFollow || "N/A"}
🗣 Conversations: ${data.conversation} (${data.mode})
📅 PA's Today: ${data.paCount}
📋 Types: ${data.paTypes}
🏃 Physical Exercise: ${data.exercise}
🧘 Meditation: ${data.meditation}
💭 Reflection: ${data.journal || "N/A"}`;

  data.fullOutput = result;

  output.textContent = result;
  output.classList.remove("hidden");

  try {
    await navigator.clipboard.writeText(result);
  } catch (err) {
    console.log("Clipboard failed", err);
  }

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(data)
    });

    if (["30/30", "60/90", "90/90"].includes(data.dcrDay)) {
      confetti({
        particleCount: 220,
        spread: 100,
        origin: { y: 0.6 }
      });
    }

    alert("Submitted! Copied and sent to Telegram.");

  } catch (error) {
    console.error(error);
    alert("Submission failed. Check console.");
  }

  submitBtn.disabled = false;
  submitBtn.textContent = "Submit Reflection";
});
</script>

</body>
</html>
