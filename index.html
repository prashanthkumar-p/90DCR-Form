<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Daily Reflection Form</title>

<style>
  body {
    font-family: Arial, sans-serif;
    padding: 15px;
    max-width: 600px;
    margin: auto;
  }

  label {
    font-weight: bold;
    display: block;
    margin-top: 15px;
  }

  input, select, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    box-sizing: border-box;
  }

  button {
    margin-top: 20px;
    padding: 12px;
    width: 100%;
    background-color: #4CAF50;
    color: white;
    font-size: 16px;
    border: none;
    border-radius: 5px;
  }

  button:disabled {
    background-color: #999;
  }

  pre {
    background: #f4f4f4;
    padding: 15px;
    white-space: pre-wrap;
    margin-top: 20px;
    border-radius: 5px;
  }
</style>
</head>

<body>

<h2>Daily Reflection Form</h2>

<form id="reflectionForm">
  <label>Name</label>
  <input type="text" id="name" required />

  <label>Date 📆</label>
  <input type="date" id="date" required />

  <label>DCR 🏃</label>
  <input type="text" id="dcr" required />

  <label>U ✅ Used Products?</label>
  <select id="used" required>
    <option value="">Select</option>
    <option value="Yes - All I could use today">Yes</option>
    <option value="No">No</option>
  </select>

  <label>L 🎧 Audio title and speakers</label>
  <input type="text" id="listened" required />

  <label>✍️ Key Takeaways from audio</label>
  <textarea id="listenedTakeaway" rows="3" required></textarea>

  <label>R 📖 Book title and chapter</label>
  <input type="text" id="read" required />

  <label>✍️ Key Takeaways from reading</label>
  <textarea id="readTakeaway" rows="3" required></textarea>

  <label>A 🤝 Associate</label>
  <select id="associate" required>
    <option value="">Select</option>
    <option value="NA VES">NA VES</option>
    <option value="UK VES">UK VES</option>
    <option value="IND VES">IND VES</option>
    <option value="AUS VES">AUS VES</option>
  </select>

  <label>A ✅ Accountability Message</label>
  <textarea id="accountability" rows="2" required></textarea>

  <label>C 🗣 Conversation initiated?</label>
  <select id="conversationInitiated" required>
    <option value="">Select</option>
    <option value="No">No</option>
    <option value="Yes">Yes</option>
  </select>

  <div id="conversationLogicDiv" style="display:none;">
    <label>If Yes, what mode?</label>
    <select id="conversationLogic">
      <option value="">Select</option>
      <option value="Online">Online</option>
      <option value="Offline">Offline</option>
      <option value="Both">Both</option>
    </select>
  </div>

  <label>Additional Question optional</label>
  <textarea id="question" rows="2"></textarea>

  <label>Reflections</label>
  <textarea id="reflections" rows="4" required></textarea>

  <button type="submit" id="submitBtn">Submit</button>
</form>

<pre id="output"></pre>

<script>
  const form = document.getElementById("reflectionForm");
  const conversationSelect = document.getElementById("conversationInitiated");
  const conversationLogicDiv = document.getElementById("conversationLogicDiv");
  const conversationLogicSelect = document.getElementById("conversationLogic");
  const output = document.getElementById("output");
  const submitBtn = document.getElementById("submitBtn");

  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxI7YYgib0Ttox7DiIsju6KHJ7pcsstYml_mCM4MpwvDpxCpGfT5Q4lZCHceeE49GE0/exec";

  conversationSelect.addEventListener("change", function () {
    if (conversationSelect.value === "Yes") {
      conversationLogicDiv.style.display = "block";
      conversationLogicSelect.required = true;
    } else {
      conversationLogicDiv.style.display = "none";
      conversationLogicSelect.required = false;
      conversationLogicSelect.value = "";
    }
  });

  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";

    let convMode = conversationLogicSelect.value;

    if (convMode === "Both") {
      convMode = "Online and Offline";
    }

    const payload = {
      name: document.getElementById("name").value,
      date: document.getElementById("date").value,
      dcr: document.getElementById("dcr").value,
      used: document.getElementById("used").value,
      listened: document.getElementById("listened").value,
      listenedTakeaway: document.getElementById("listenedTakeaway").value,
      read: document.getElementById("read").value,
      readTakeaway: document.getElementById("readTakeaway").value,
      associate: document.getElementById("associate").value,
      accountability: document.getElementById("accountability").value,
      conversation: conversationSelect.value,
      conversationMode: convMode,
      question: document.getElementById("question").value,
      reflections: document.getElementById("reflections").value
    };

    const result =
`Name — ${payload.name}
Date 📆 - ${payload.date}
DCR 🏃 - ${payload.dcr}
U ✅ - ${payload.used}
L 🎧 - ${payload.listened}
✍️ Key Takeaways - ${payload.listenedTakeaway}
R 📖 - ${payload.read}
✍️ Key Takeaways - ${payload.readTakeaway}
A 🤝 - ${payload.associate}
A ✅ - ${payload.accountability}
C 🗣 - ${payload.conversation}
${payload.conversation === "Yes" ? `Logic - ${payload.conversationMode}` : ""}
Q ❓ - ${payload.question || "N/A"}
Reflections - ${payload.reflections}`;

    output.textContent = result;

    try {
      await navigator.clipboard.writeText(result);
    } catch (err) {
      console.log("Clipboard copy failed:", err);
    }

    try {
      await fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(payload)
      });

      alert("Submitted! Please check Telegram.");

      form.reset();
      conversationLogicDiv.style.display = "none";

    } catch (error) {
      console.error("Submission error:", error);
      alert("Submission failed. Please check browser console.");
    }

    submitBtn.disabled = false;
    submitBtn.textContent = "Submit";
  });
</script>

</body>
</html>
